name: Deploy VitePress site to GitHub Pages

on:
  # 每次 push 到 main 自动部署
  push:
    branches: [main]

  # 也允许手动从 Actions 页面触发
  workflow_dispatch:

# 同时只跑一个部署，避免并发冲突；不取消已运行的（确保新数据 push 不中断旧 build）
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 取完整历史让 lastUpdated 可用

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
